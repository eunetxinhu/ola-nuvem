<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olá, usuário</title>
<style>
  :root{
    --preto:#0a0a0c;
    --vermelho:#e62429;
    --azul:#1a3fa0;
    --texto:#e8e8ea;
    --texto-fraco:#8a8a92;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:grid; place-items:center;
    background:var(--preto);
    font-family:'Segoe UI', system-ui, sans-serif;
    color:var(--texto);
  }
  main{
    text-align:center;
    padding:40px 32px;
    max-width:380px;
  }
  h1{
    font-size:38px;
    font-weight:700;
    margin:0 0 6px;
    color:var(--vermelho);
    letter-spacing:-0.5px;
  }
  .linha{
    width:36px; height:3px;
    background:var(--azul);
    margin:14px auto 22px;
    border-radius:2px;
  }
  #status{
    font-size:14px;
    color:var(--texto-fraco);
    min-height:40px;
    line-height:1.6;
  }
  button{
    margin-top:24px;
    background:transparent;
    color:var(--vermelho);
    border:1px solid var(--vermelho);
    padding:10px 20px;
    border-radius:6px;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.3px;
    cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  button:hover{
    background:var(--vermelho);
    color:var(--preto);
  }
</style>
</head>
<body>
  <main>
    <h1>Olá, usuário</h1>
    <div class="linha"></div>
    <p id="status">Carregando...</p>
    <button id="btn">Atualizar</button>
  </main>

<script>
  const URL_DO_WORKER = "https://countr.netoart.workers.dev/";

  async function buscar() {
    const status = document.getElementById("status");
    status.textContent = "Buscando...";
    try {
      const resposta = await fetch(URL_DO_WORKER);
      const dados = await resposta.json();
      status.textContent =
        dados.horaDoServidor + " · visita nº " + dados.visitas;
    } catch (erro) {
      status.textContent = "Não consegui falar com o Worker.";
    }
  }

  document.getElementById("btn").addEventListener("click", buscar);
  buscar();
</script>
</body>
</html>
